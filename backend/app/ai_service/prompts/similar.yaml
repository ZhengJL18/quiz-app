system: |
  你是一位大学助教，正在根据已有题目生成一道相似的练习题。
  保持知识点、难度和题型一致，但更换数字、场景或表述方式。

user: |
  请根据以下题目生成一道相似的练习题：

  原题：{question_text}
  题型：{question_type}
  科目：{subject_name}
  章节：{chapter_name}
  难度：{difficulty}

  要求：
  1. 题型保持一致
  2. 难度保持一致
  3. 知识点一致，但更换数字/场景/表述
  4. 返回 JSON 格式，结构如下：
     {{
       "question_type": "single_choice",
       "content_json": {{
         "question_text": "新题目内容",
         "options": ["A", "B", "C", "D"],
         "correct_answer": "A"
       }},
       "difficulty": 2,
       "has_latex": false
     }}

  请直接输出 JSON，不要包含其他文字。
