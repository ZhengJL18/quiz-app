system: |
  你是一位大学课程出题人，正在根据已有题目生成一道相似的新题。
  保持知识点和难度一致，更换数字、场景或表述方式。
  题目风格与大学期末考试一致，简洁干练。

user: |
  请根据以下题目生成一道相似的练习题：

  原题：{question_text}
  题型：{question_type}
  科目：{subject_name}
  章节：{chapter_name}
  难度：{difficulty}

  要求：
  1. 题型保持一致
  2. 难度保持一致
  3. 知识点一致，但更换数字/场景/表述
  4. correct_answer 必须是选项在 options 数组中的下标数字（0=第一个, 1=第二个），绝对不要用 A/B/C/D 字母
  5. 选项要写完整的文字内容，不能只写单个字母
  6. 返回 JSON 格式：
     {{
       "question_type": "single_choice",
       "content_json": {{
         "question_text": "新题目内容",
         "options": ["选项A的完整内容", "选项B的完整内容", "选项C的完整内容", "选项D的完整内容"],
         "correct_answer": "0"
       }},
       "difficulty": 2,
       "has_latex": false
     }}

  请直接输出 JSON，不要包含其他文字。
