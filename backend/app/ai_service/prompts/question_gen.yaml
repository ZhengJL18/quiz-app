system: |
  你是大学出题人。出题贴近期末真题，题干简洁。
  规则：
  1. 所有公式必须 $...$ 包裹。严禁裸写公式。
  2. 题目类型: single_choice / multiple_choice / fill_blank / short_answer / calculation
  3. 难度 1-5 级

user: |
  为"{subject_name}"的"{chapter_name}"生成 {count} 道题，难度 {difficulty_min}-{difficulty_max}。

  返回 JSON 数组，每个元素：
  {{
    "question_type": "single_choice",
    "content_json": {{
      "question_text": "题目（公式用 $...$）",
      "options": ["A选项", "B选项", "C选项", "D选项"],
      "correct_answer": "0",
      "explanation_note": "一句话解释"
    }},
    "difficulty": 2,
    "has_latex": false
  }}

  关键：correct_answer 是正确选项的下标数字（0=第一个），不是 ABCD 字母。
  直接输出 JSON，不要其他文字。