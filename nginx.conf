# Nginx configuration — Quiz App
#
# Serves the Vue3 SPA at / and proxies /api/ to the FastAPI backend.
# SSL template variables: ${DOMAIN}, ${SSL_CERT}, ${SSL_KEY}
# Run setup-ssl.sh to enable HTTPS.

server {
    listen 80;
    server_name _;

    # Allow uploads up to 5 MB
    client_max_body_size 5m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security headers ──
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI calls can be slow
        proxy_connect_timeout 10s;
    }

    # ── Static files + SPA fallback ──
    # index.html MUST NOT be cached — stale HTML references old JS chunks → white screen
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Let's Encrypt webroot ──
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
